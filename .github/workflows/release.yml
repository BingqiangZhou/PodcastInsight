# Personal AI Assistant - Multi-Platform Release Workflow
# 多平台自动构建并发布到 GitHub Release
# Triggered by pushing tags matching pattern v*.*.* (e.g., v1.0.0)

name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write
  actions: write

env:
  JAVA_VERSION: '21'
  JAVA_DISTRIBUTION: 'temurin'

jobs:
  # ============================================
  # Job 1: 提取版本信息和生成更新日志
  # ============================================
  prepare-release:
    name: Prepare Release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      build_number: ${{ steps.version.outputs.build_number }}
      is_prerelease: ${{ steps.version.outputs.is_prerelease }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Extract version from tag and pubspec.yaml
        id: version
        run: |
          TAG=${{ github.ref_name }}
          VERSION=${TAG#v}

          # Extract build number from pubspec.yaml (format: version: x.y.z+build_number)
          BUILD_NUMBER=$(grep '^version:' frontend/pubspec.yaml | sed 's/^version: [0-9]\+\.[0-9]\+\.[0-9]\+//' | sed 's/^+//')

          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "build_number=$BUILD_NUMBER" >> $GITHUB_OUTPUT

          if [[ $VERSION =~ -(alpha|beta|rc|preview)\.? ]]; then
            echo "is_prerelease=true" >> $GITHUB_OUTPUT
          else
            echo "is_prerelease=false" >> $GITHUB_OUTPUT
          fi

          echo "📦 Version: $VERSION"
          echo "🔢 Build Number: $BUILD_NUMBER"

      - name: Generate changelog from CHANGELOG.md
        run: |
          VERSION="${{ steps.version.outputs.version }}"

          # Extract the version section from CHANGELOG.md
          # Match the version header (e.g., ## [0.1.9](...)) and extract content until next version
          awk -v ver="$VERSION" '
            BEGIN { found = 0; printing = 0; prefix = "## [" ver "]" }
            index($0, prefix) == 1 { found = 1; printing = 1; next }
            /^## \[/ && found { printing = 0; exit }
            printing { print }
          ' CHANGELOG.md > changelog_content.md

          # Check if we found the version content
          if [ -s changelog_content.md ]; then
            # Add header, version info, and release times
            {
              echo "## 📦 Release v$VERSION"
              echo ""
              cat changelog_content.md
              echo ""
              echo "---"
              echo ""
              echo "**Version:** \`$VERSION\`"
              echo "**Release Date:**"
              echo "- $(date -u +'%Y-%m-%d %H:%M:%S %Z (%z)')"
              echo "- $(TZ=Asia/Shanghai date +'%Y-%m-%d %H:%M:%S %Z (%z)')"
            } > changelog.md
            rm changelog_content.md
          else
            # Fallback: Version not found in CHANGELOG.md
            {
              echo "## 📦 Release v$VERSION"
              echo ""
              echo "**⚠️ Version not found in CHANGELOG.md. Please add changelog entry for this version.**"
              echo ""
              echo "**Version:** \`$VERSION\`"
              echo "**Release Date:**"
              echo "- $(date -u +'%Y-%m-%d %H:%M:%S %Z (%z)')"
              echo "- $(TZ=Asia/Shanghai date +'%Y-%m-%d %H:%M:%S %Z (%z)')"
            } > changelog.md
          fi

      - name: Upload changelog artifact
        uses: actions/upload-artifact@v7
        with:
          name: changelog
          path: changelog.md

  # ============================================
  # Job 2: 构建 Android APK/AAB
  # ============================================
  build-android:
    name: Build Android
    needs: prepare-release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          gradle-version: wrapper
          cache-read-only: false
          build-root-directory: frontend/android

      - name: Cache Pub cache
        uses: actions/cache@v5
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-cache-${{ hashFiles('frontend/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-cache-

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Get dependencies
        working-directory: frontend
        run: flutter pub get

      - name: Setup Android Keystore for Release Signing
        run: |
          cd frontend/android/app
          echo "${{ secrets.ANDROID_KEYSTORE_B64 }}" | base64 -d > release.keystore
          cat > key.properties << EOF
          storeFile=release.keystore
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          EOF
          echo "✅ Keystore configured"

      - name: Build APK (Release)
        working-directory: frontend
        run: |
          echo "🔨 Building Android APK..."
          echo "Version: ${{ needs.prepare-release.outputs.version }}"
          echo "Build Number: ${{ needs.prepare-release.outputs.build_number }}"

          flutter build apk \
            --release \
            --no-pub \
            --target-platform android-arm64 \
            --build-name=${{ needs.prepare-release.outputs.version }} \
            --build-number=${{ needs.prepare-release.outputs.build_number }}

          # 重命名 APK 包含应用名和版本号
          mv build/app/outputs/flutter-apk/app-release.apk \
             build/app/outputs/flutter-apk/personal-ai-assistant-android-arm64-${{ needs.prepare-release.outputs.version }}.apk

          echo "✅ APK build completed"

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: android-artifacts
          path: frontend/build/app/outputs/flutter-apk/*.apk
          retention-days: 7

  # ============================================
  # Job 3: 构建 Windows
  # ============================================
  build-windows:
    name: Build Windows
    needs: prepare-release
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Cache Pub cache
        uses: actions/cache@v5
        with:
          path: ${{ env.USERPROFILE }}\.pub-cache
          key: ${{ runner.os }}-pub-cache-${{ hashFiles('frontend/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-cache-

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Enable Windows desktop
        shell: pwsh
        run: flutter config --enable-windows-desktop

      - name: Get dependencies
        working-directory: frontend
        shell: pwsh
        run: flutter pub get

      - name: Build Windows
        working-directory: frontend
        shell: pwsh
        run: |
          Write-Host "🔨 Building Windows application..."
          flutter build windows --release --no-pub --build-number=${{ needs.prepare-release.outputs.build_number }}
          Write-Host "✅ Windows build completed"

      - name: Create release directory
        working-directory: frontend
        shell: pwsh
        run: New-Item -ItemType Directory -Force -Path dist/windows

      - name: Archive Windows release
        working-directory: frontend
        shell: pwsh
        run: |
          $version = "${{ needs.prepare-release.outputs.version }}"
          $sourcePath = "build\windows\x64\runner\Release"
          $destPath = "dist\windows\personal-ai-assistant-windows-$version.zip"
          Compress-Archive -Path "$sourcePath\*" -DestinationPath $destPath -Force

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: windows-artifact
          path: frontend/dist/windows/*.zip
          retention-days: 7

  # ============================================
  # Job 4: 构建 Linux
  # ============================================
  build-linux:
    name: Build Linux
    needs: prepare-release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Cache Pub cache
        uses: actions/cache@v5
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-cache-${{ hashFiles('frontend/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-cache-

      - name: Install Linux dependencies
        run: |
          echo "📦 Installing Linux build dependencies..."
          sudo apt-get update
          sudo apt-get install -y \
            clang cmake ninja-build pkg-config \
            libgtk-3-dev libglib2.0-dev libpango1.0-dev \
            libatk1.0-dev libcairo-gobject2 libgdk-pixbuf2.0-dev \
            libgraphene-1.0-dev libharfbuzz-dev \
            liblzma-dev libstdc++-12-dev \
            libsecret-1-dev \
            libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev
          echo "✅ Build dependencies installed"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Enable Linux desktop
        run: flutter config --enable-linux-desktop

      - name: Get dependencies
        working-directory: frontend
        run: flutter pub get

      - name: Build Linux
        working-directory: frontend
        run: |
          echo "🔨 Building Linux application..."
          flutter build linux \
            --release \
            --no-pub \
            --build-number=${{ needs.prepare-release.outputs.build_number }}
          echo "✅ Linux build completed"

      - name: Create release directory
        working-directory: frontend
        run: mkdir -p dist/linux

      - name: Archive Linux release
        working-directory: frontend
        run: |
          tar czf dist/linux/personal-ai-assistant-linux-${{ needs.prepare-release.outputs.version }}.tar.gz \
            -C build/linux/x64/release/bundle .

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: linux-artifact
          path: frontend/dist/linux/*.tar.gz
          retention-days: 7

  # ============================================
  # Job 5: 构建 macOS
  # ============================================
  build-macos:
    name: Build macOS
    needs: prepare-release
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Cache Pub cache
        uses: actions/cache@v5
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-cache-${{ hashFiles('frontend/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-cache-

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Enable macOS desktop
        run: flutter config --enable-macos-desktop

      - name: Get dependencies
        working-directory: frontend
        run: flutter pub get

      - name: Build macOS
        working-directory: frontend
        run: |
          echo "🔨 Building macOS application..."
          flutter build macos \
            --release \
            --no-pub \
            --build-number=${{ needs.prepare-release.outputs.build_number }}
          echo "✅ macOS build completed"

      - name: Create release directory
        working-directory: frontend
        run: mkdir -p dist/macos

      - name: Create DMG
        working-directory: frontend
        run: |
          DMG_PATH="dist/macos/personal-ai-assistant-macos-${{ needs.prepare-release.outputs.version }}.dmg"
          TEMP_DIR="dist/macos/dmg-temp"
          RELEASE_DIR="build/macos/Build/Products/Release"

          # Create temporary directory for DMG contents
          mkdir -p "$TEMP_DIR"

          # Copy app bundle to temp directory
          cp -R "$RELEASE_DIR"/*.app "$TEMP_DIR/"

          # Create Applications symlink for drag-and-drop
          ln -s /Applications "$TEMP_DIR/Applications"

          # Create DMG using hdiutil
          hdiutil create -volname "Personal AI Assistant" \
            -srcfolder "$TEMP_DIR" \
            -ov \
            -format UDZO \
            "$DMG_PATH"

          # Clean up temp directory
          rm -rf "$TEMP_DIR"

          echo "✅ DMG created at $DMG_PATH"

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: macos-artifact
          path: frontend/dist/macos/*.dmg
          retention-days: 7

  # ============================================
  # Job 6: 构建 iOS (真机版本，无签名)
  # ============================================
  build-ios:
    name: Build iOS Device (No Codesign)
    needs: prepare-release
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Cache Pub cache
        uses: actions/cache@v5
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-cache-${{ hashFiles('frontend/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-cache-

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Get dependencies
        working-directory: frontend
        run: flutter pub get

      - name: Build iOS (Release, No Codesign)
        working-directory: frontend
        run: |
          echo "🔨 Building iOS application (release, no code signing)..."
          flutter build ios \
            --release \
            --no-codesign \
            --no-pub \
            --build-number=${{ needs.prepare-release.outputs.build_number }}

          echo "✅ iOS build completed"

      - name: Create release directory
        working-directory: frontend
        run: mkdir -p dist/ios

      - name: Package IPA (Device)
        working-directory: frontend
        run: |
          VERSION="${{ needs.prepare-release.outputs.version }}"
          # Device builds use iphoneos
          APP_PATH="build/ios/iphoneos/Runner.app"
          IPA_NAME="personal-ai-assistant-ios-${VERSION}.ipa"
          PAYLOAD_DIR="dist/ios/Payload"
          OUTPUT_DIR="dist/ios"

          # Create Payload directory structure for IPA
          mkdir -p "$PAYLOAD_DIR"

          # Copy app bundle to Payload
          if [ -d "$APP_PATH" ]; then
            cp -R "$APP_PATH" "$PAYLOAD_DIR/"

            # Create IPA by zipping the Payload directory
            cd "$OUTPUT_DIR"
            zip -r "$IPA_NAME" Payload
            cd ../..

            echo "✅ IPA created for iOS Device at ${OUTPUT_DIR}/${IPA_NAME}"
          else
            echo "⚠️ App bundle not found at expected path: $APP_PATH"
            echo "📁 Looking for .app bundles in build/ios:"
            find build/ios -name "*.app" -type d 2>/dev/null || echo "No .app bundles found"
            exit 1
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: ios-artifacts
          path: frontend/dist/ios/*.ipa
          retention-days: 7

  # ============================================
  # Job 7: 发布到 GitHub Release
  # ============================================
  create-release:
    name: Create Release
    needs:
      - prepare-release
      - build-android
      - build-windows
      - build-linux
      - build-macos
      - build-ios
    runs-on: ubuntu-latest
    if: |
      needs.prepare-release.result == 'success' &&
      needs.build-android.result == 'success' &&
      needs.build-windows.result == 'success' &&
      needs.build-linux.result == 'success' &&
      needs.build-macos.result == 'success' &&
      needs.build-ios.result == 'success'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Download changelog
        uses: actions/download-artifact@v8
        with:
          name: changelog
          path: .

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Display artifacts structure
        run: |
          echo "📁 Downloaded artifacts:"
          find artifacts -type f | sort

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ needs.prepare-release.outputs.version }}
          name: Personal AI Assistant v${{ needs.prepare-release.outputs.version }}
          body_path: changelog.md
          draft: false
          prerelease: ${{ needs.prepare-release.outputs.is_prerelease }}
          files: |
            artifacts/android-artifacts/**/*.apk
            artifacts/windows-artifact/**/*.zip
            artifacts/linux-artifact/**/*.tar.gz
            artifacts/macos-artifact/**/*.dmg
            artifacts/ios-artifacts/**/*.ipa
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Release Summary
        run: |
          echo "### ✅ Release Created Successfully!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** v${{ needs.prepare-release.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "**Prerelease:** ${{ needs.prepare-release.outputs.is_prerelease }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "#### 📦 Released Artifacts:" >> $GITHUB_STEP_SUMMARY
          echo "- 🤖 Android APK" >> $GITHUB_STEP_SUMMARY
          echo "- 🪟 Windows Executable (ZIP)" >> $GITHUB_STEP_SUMMARY
          echo "- 🐧 Linux Binary (TAR.GZ)" >> $GITHUB_STEP_SUMMARY
          echo "- 🍎 macOS Application (DMG)" >> $GITHUB_STEP_SUMMARY
          echo "- 📱 iOS Device (IPA, No Codesign)" >> $GITHUB_STEP_SUMMARY
