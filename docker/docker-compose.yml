version: "3.9"

services:
  # ── PostgreSQL ──────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: podcastinsight-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-podcastinsight}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Redis ───────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: podcastinsight-redis
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── FastAPI Backend ─────────────────────────────────────────────────────
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    image: ghcr.io/bingqiangzhou/podcast-insight/backend:1.0.0
    container_name: podcastinsight-backend
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      APP_NAME: ${APP_NAME:-PodcastInsight}
      DEBUG: ${DEBUG:-false}
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-podcastinsight}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-}
      WHISPER_MODEL: ${WHISPER_MODEL:-whisper-1}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      XYZRANK_API_URL: ${XYZRANK_API_URL:-https://xyzrank.com/api/podcasts}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://localhost:8000}
    ports:
      - "8000:8000"
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    restart: unless-stopped

  # ── Celery Worker ───────────────────────────────────────────────────────
  celery-worker:
    build:
      context: ../backend
      dockerfile: Dockerfile
    image: ghcr.io/bingqiangzhou/podcast-insight/backend:1.0.0
    container_name: podcastinsight-celery-worker
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      APP_NAME: ${APP_NAME:-PodcastInsight}
      DEBUG: ${DEBUG:-false}
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-podcastinsight}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-}
      WHISPER_MODEL: ${WHISPER_MODEL:-whisper-1}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      XYZRANK_API_URL: ${XYZRANK_API_URL:-https://xyzrank.com/api/podcasts}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://localhost:8000}
    command: celery -A app.core.celery_app worker -l info -Q default,transcription,summary
    restart: unless-stopped

  # ── Celery Beat Scheduler ───────────────────────────────────────────────
  celery-beat:
    build:
      context: ../backend
      dockerfile: Dockerfile
    image: ghcr.io/bingqiangzhou/podcast-insight/backend:1.0.0
    container_name: podcastinsight-celery-beat
    depends_on:
      redis:
        condition: service_healthy
    environment:
      APP_NAME: ${APP_NAME:-PodcastInsight}
      DEBUG: ${DEBUG:-false}
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-podcastinsight}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-}
      WHISPER_MODEL: ${WHISPER_MODEL:-whisper-1}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      XYZRANK_API_URL: ${XYZRANK_API_URL:-https://xyzrank.com/api/podcasts}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://localhost:8000}
    command: celery -A app.core.celery_app beat -l info
    restart: unless-stopped

  # ── Next.js Frontend ───────────────────────────────────────────────────
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    image: ghcr.io/bingqiangzhou/podcast-insight/frontend:1.0.0
    container_name: podcastinsight-frontend
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: http://backend:8000/api/v1
    ports:
      - "3000:3000"
    restart: unless-stopped

  # ── Nginx Reverse Proxy (production only) ──────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: podcastinsight-nginx
    profiles:
      - production
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
    depends_on:
      - backend
      - frontend
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
